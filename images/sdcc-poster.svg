<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" role="img" aria-label="San Diego Comic-Con poster">
  <defs>
    <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd23f"/>
      <stop offset="100%" stop-color="#e63946"/>
    </linearGradient>
  </defs>
  <rect width="400" height="600" fill="url(#sg)"/>
  <g fill="#1d3557" opacity="0.14">
    <circle cx="60" cy="100" r="40"/>
    <circle cx="350" cy="130" r="60"/>
    <circle cx="80" cy="500" r="55"/>
    <circle cx="340" cy="480" r="45"/>
  </g>
  <rect x="40" y="230" width="320" height="160" rx="14" fill="#1d3557"/>
  <text x="200" y="280" text-anchor="middle" font-family="Impact, sans-serif" font-size="44" fill="#ffd23f" letter-spacing="2">COMIC-CON</text>
  <text x="200" y="310" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#fff" letter-spacing="6">INTERNATIONAL</text>
  <text x="200" y="340" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffd23f" letter-spacing="2">SAN DIEGO 2026</text>
  <text x="200" y="365" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#fff">JULY 23–26</text>
  <text x="200" y="460" text-anchor="middle" font-family="sans-serif" font-size="11" fill="#1d3557" font-weight="bold" letter-spacing="3">POP CULTURE. REIMAGINED.</text>
</svg>
